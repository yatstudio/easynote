<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EasyNote · 保险箱备忘录</title>
  <style>
    :root{--bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--muted:#6e6e73;--line:rgba(0,0,0,.08);--yellow:#ffd60a;--blue:#007aff;--green:#34c759;--red:#ff3b30;--shadow:0 24px 60px rgba(0,0,0,.12)}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;background:radial-gradient(circle at 16% 8%,rgba(255,214,10,.32),transparent 28%),radial-gradient(circle at 92% 6%,rgba(0,122,255,.14),transparent 32%),linear-gradient(135deg,#fbfbfd,#f5f5f7);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Helvetica Neue",Arial,sans-serif} button,input,select{font:inherit}button{border:0;cursor:pointer}.hidden{display:none!important}
    .app{width:min(1440px,calc(100vw - 32px));height:calc(100vh - 32px);margin:16px auto;display:grid;grid-template-columns:260px 360px 1fr;border:1px solid rgba(255,255,255,.8);border-radius:30px;overflow:hidden;background:rgba(255,255,255,.62);box-shadow:var(--shadow);backdrop-filter:blur(24px)}
    .side{padding:22px 16px;border-right:1px solid var(--line);background:rgba(246,246,248,.82);overflow:auto}.brand{display:flex;gap:12px;align-items:center;padding:0 8px 20px}.logo{width:44px;height:44px;border-radius:15px;display:grid;place-items:center;background:linear-gradient(145deg,#ffe35a,#ffb700);font-size:22px}.brand h1{margin:0;font-size:19px;letter-spacing:-.04em}.brand p{margin:2px 0 0;color:var(--muted);font-size:12px}.vault{background:#fff;border:1px solid var(--line);border-radius:22px;padding:16px;margin-bottom:16px}.vault small{color:var(--muted)}.vault strong{display:block;margin-top:4px;font-size:18px;letter-spacing:.08em}.status{display:flex;gap:8px;align-items:center;margin-top:12px;color:var(--green);font-size:13px}.dot{width:8px;height:8px;border-radius:50%;background:var(--green)}.section{margin-top:18px}.section-title{padding:0 10px 8px;color:var(--muted);font-size:12px;font-weight:800;text-transform:uppercase}.nav{width:100%;display:flex;align-items:center;justify-content:space-between;text-align:left;padding:10px 12px;border-radius:13px;background:transparent;color:#2d2d2f;margin:2px 0}.nav.active{background:rgba(255,214,10,.55);font-weight:800}.count{color:var(--muted);font-size:13px}.side-actions{display:grid;gap:8px;margin-top:20px}.black{background:#1d1d1f;color:#fff}.danger{background:var(--red);color:#fff}.secondary{background:#f2f2f4;color:#222}.primary{background:var(--blue);color:#fff}.side-actions button,.modal button{border-radius:14px;padding:12px;font-weight:800}
    .list{display:flex;flex-direction:column;border-right:1px solid var(--line);background:rgba(255,255,255,.74);min-width:0}.list-head{padding:24px 22px 14px}.head-row{display:flex;align-items:center;justify-content:space-between}.head-row h2{margin:0;font-size:30px;letter-spacing:-.055em}.new{width:42px;height:42px;border-radius:50%;background:var(--yellow);font-size:26px;box-shadow:0 8px 18px rgba(216,155,0,.22)}.search{width:100%;margin-top:16px;padding:12px 14px;border:0;outline:0;border-radius:14px;background:#f1f1f3}.notes{padding:0 12px 18px;overflow:auto}.note{padding:15px 14px;border-radius:18px;margin:7px 0;border:1px solid transparent;cursor:pointer}.note.active{background:#fff8d6;border-color:rgba(216,155,0,.22)}.note h3{margin:0;font-size:16px}.note p{margin:6px 0 10px;color:var(--muted);font-size:13px;line-height:1.45}.meta{display:flex;align-items:center;justify-content:space-between;color:var(--muted);font-size:12px}.chips{display:flex;gap:5px}.chip{background:rgba(0,0,0,.06);padding:2px 6px;border-radius:99px}.empty{padding:18px 14px;color:var(--muted)}
    .editor{display:flex;flex-direction:column;background:rgba(255,255,255,.9);min-width:0}.toolbar{min-height:72px;padding:12px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}.tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.tool{min-width:36px;height:36px;padding:0 12px;border-radius:11px;background:#f2f2f4;font-weight:800}.tool.on{background:var(--yellow)}.save{color:var(--muted);font-size:13px}.content{padding:34px 52px;overflow:auto;max-width:960px}.title{width:100%;border:0;outline:0;background:transparent;font-size:42px;font-weight:900;letter-spacing:-.06em;margin-bottom:10px}.date{color:var(--muted);font-size:13px;margin-bottom:22px}.body{min-height:260px;outline:0;font-size:18px;line-height:1.75}.body img{max-width:100%;border-radius:18px;margin:12px 0}.body a{color:var(--blue)}.body blockquote{border-left:4px solid var(--yellow);margin:14px 0;padding:4px 0 4px 14px;color:#444}.body pre{background:#f2f2f4;border-radius:16px;padding:14px;overflow:auto}.media-block{border:1px solid var(--line);border-radius:18px;background:#fff;padding:14px;margin:14px 0}.link-card{display:flex;gap:12px;align-items:flex-start}.favicon{width:42px;height:42px;border-radius:12px;background:#e8f1ff;display:grid;place-items:center}.attach{display:flex;gap:12px;align-items:center}.file{width:44px;height:44px;border-radius:14px;background:#f2f2f4;display:grid;place-items:center}.upload{display:none}.editor-placeholder{display:grid;place-items:center;height:100%;color:var(--muted);font-size:18px}
    .entry{position:fixed;inset:0;background:rgba(245,245,247,.72);backdrop-filter:blur(18px);display:grid;place-items:center;z-index:40}.entry-card{width:min(520px,calc(100vw - 32px));background:rgba(255,255,255,.94);border:1px solid rgba(255,255,255,.8);border-radius:30px;padding:24px;box-shadow:var(--shadow)}.entry-card h2{margin:0;font-size:32px;letter-spacing:-.06em}.entry-card p{color:var(--muted);line-height:1.55}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:18px 0}.tab{border-radius:14px;padding:12px;background:#f2f2f4;font-weight:800}.tab.active{background:var(--yellow)}.field{display:grid;gap:6px;margin:10px 0}.field label{font-size:13px;color:var(--muted);font-weight:800}.field input,.field select{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;background:#fafafa;outline:0}.form-actions{display:flex;gap:10px;margin-top:14px}.form-actions button{flex:1;border-radius:14px;padding:13px;font-weight:900}.hint{font-size:12px;color:var(--muted)}
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.22);display:none;place-items:center;z-index:50}.modal-backdrop.show{display:grid}.modal{width:min(460px,calc(100vw - 32px));background:rgba(255,255,255,.97);border-radius:24px;padding:20px;box-shadow:var(--shadow)}.modal h3{margin:0 0 8px}.modal p{margin:0 0 14px;color:var(--muted);line-height:1.5}.modal input,.modal select{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;margin:8px 0;background:#fafafa}.modal-row{display:flex;gap:8px;justify-content:flex-end;margin-top:10px}.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(18px);padding:12px 16px;border-radius:999px;background:rgba(29,29,31,.92);color:#fff;font-size:14px;opacity:0;pointer-events:none;transition:.22s;z-index:80}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media(max-width:980px){.app{width:100vw;height:100vh;margin:0;border-radius:0;grid-template-columns:1fr}.side{display:none}.list{display:none}.content{padding:24px}.title{font-size:34px}.toolbar{padding:10px}.save{width:100%}}
  </style>
</head>
<body>
  <main class="app" id="app">
    <aside class="side">
      <div class="brand"><div class="logo">🔐</div><div><h1>EasyNote</h1><p>保险箱备忘录</p></div></div>
      <div class="vault"><small>当前保险箱</small><strong id="vaultCodeLabel">未打开</strong><div class="status"><span class="dot"></span><span id="lockStatus">已解锁</span></div></div>
      <section class="section"><div class="section-title">备忘录</div>
        <button class="nav active" data-filter="all"><span>📝 所有备忘录</span><span class="count" id="countAll">0</span></button>
        <button class="nav" data-filter="pinned"><span>📌 已置顶</span><span class="count" id="countPinned">0</span></button>
        <button class="nav" data-filter="recent"><span>🕘 最近编辑</span><span class="count" id="countRecent">0</span></button>
        <button class="nav" data-filter="images"><span>🖼️ 含图片</span><span class="count" id="countImages">0</span></button>
        <button class="nav" data-filter="links"><span>🔗 含链接</span><span class="count" id="countLinks">0</span></button>
      </section>
      <section class="section"><div class="section-title">保险箱</div>
        <button class="nav" data-filter="trash"><span>🗑️ 废纸篓</span><span class="count" id="countTrash">0</span></button>
        <button class="nav" id="settingsBtn"><span>⚙️ 设置</span><span></span></button>
      </section>
      <div class="side-actions"><button class="black" id="lockBtn">锁定保险箱</button><button class="secondary" id="exportBtn">导出数据</button><button class="danger" id="deleteVaultBtn">删除保险箱</button></div>
    </aside>
    <section class="list"><div class="list-head"><div class="head-row"><h2 id="listTitle">备忘录</h2><button class="new" id="newBtn">+</button></div><input class="search" id="search" placeholder="搜索标题、正文、链接、图片说明" /></div><div class="notes" id="notes"></div></section>
    <section class="editor" id="editor"><div class="editor-placeholder">请先打开或创建保险箱</div></section>
  </main>

  <section class="entry" id="entry">
    <div class="entry-card"><h2>打开 EasyNote</h2><p>无需注册。像超市 locker 一样，创建一个保险箱编号和密码，之后用它们进入自己的备忘录空间。</p>
      <div class="tabs"><button class="tab active" id="openTab">打开保险箱</button><button class="tab" id="createTab">创建保险箱</button></div>
      <div id="openForm"><div class="field"><label>保险箱编号</label><input id="openCode" placeholder="例如 A7K9-23QX" /></div><div class="field"><label>保险箱密码</label><input id="openPassword" type="password" placeholder="输入密码" /></div><div class="form-actions"><button class="primary" id="openVaultBtn">打开保险箱</button></div></div>
      <div id="createForm" class="hidden"><div class="field"><label>设置保险箱密码</label><input id="createPassword" type="password" placeholder="至少 4 位" /></div><div class="field"><label>确认密码</label><input id="confirmPassword" type="password" /></div><p class="hint">请牢记编号和密码；本地原型不提供找回。</p><div class="form-actions"><button class="primary" id="createVaultBtn">创建并进入</button></div></div>
    </div>
  </section>

  <input id="imageInput" class="upload" type="file" accept="image/*" multiple />
  <input id="fileInput" class="upload" type="file" multiple />
  <div class="modal-backdrop" id="modal"><div class="modal"><h3 id="modalTitle">提示</h3><p id="modalText"></p><div id="modalExtra"></div><div class="modal-row"><button class="secondary" id="modalCancel">取消</button><button class="primary" id="modalOk">确定</button></div></div></div>
  <div class="toast" id="toast">完成</div>

<script>
const LS='easynote.vaults.v2';
const SESSION='easynote.session.v2';
let vaults=loadVaults(), current=null, currentNoteId=null, filter='all', saveTimer=null, autoLockTimer=null;
const $=s=>document.querySelector(s), $$=s=>Array.from(document.querySelectorAll(s));
const app=$('#app'), entry=$('#entry'), notesEl=$('#notes'), editor=$('#editor'), toast=$('#toast');
function uid(p='id'){return p+'_'+Math.random().toString(36).slice(2,10)+Date.now().toString(36)}
function now(){return new Date().toISOString()} function timeLabel(iso){const d=new Date(iso);return d.toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}
function loadVaults(){try{return JSON.parse(localStorage.getItem(LS)||'[]')}catch{return[]}} function persist(){localStorage.setItem(LS,JSON.stringify(vaults))}
async function hash(s){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('')}
function msg(t){toast.textContent=t;toast.classList.add('show');clearTimeout(msg.t);msg.t=setTimeout(()=>toast.classList.remove('show'),1700)}
function modal(title,text,extra='',ok=()=>{},danger=false){$('#modalTitle').textContent=title;$('#modalText').textContent=text;$('#modalExtra').innerHTML=extra;$('#modalOk').className=danger?'danger':'primary';$('#modal').classList.add('show');$('#modalOk').onclick=()=>{$('#modal').classList.remove('show');ok()};$('#modalCancel').onclick=()=>$('#modal').classList.remove('show')}
function escapeHtml(s=''){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function templateNote(title='新备忘录'){return{id:uid('note'),title,html:'<p>开始记录文字，或插入图片、链接、附件、待办清单。</p>',plain:'开始记录文字，或插入图片、链接、附件、待办清单。',pinned:false,deleted:false,createdAt:now(),updatedAt:now(),media:{images:0,links:0,files:0}}}
function demoNotes(){return[{...templateNote('周末旅行计划'),pinned:true,html:'<p>民宿、路线、餐厅和需要带的东西。</p><ul><li>确认民宿入住时间</li><li>整理周六路线</li></ul><div class="media-block link-card"><div class="favicon">🔗</div><div><b>城市散步路线</b><br><small>链接预览卡片示例</small></div></div>',plain:'民宿 路线 餐厅 城市散步路线',media:{images:0,links:1,files:0}},{...templateNote('产品灵感：locker notes'),html:'<p>无需注册，通过保险箱编号和密码进入自己的空间。</p>',plain:'无需注册 保险箱编号 密码'},{...templateNote('购物清单'),html:'<ul><li>咖啡豆</li><li>牛奶</li><li>USB-C 线</li></ul>',plain:'咖啡豆 牛奶 USB-C 线'}]}
async function createVault(){const p=$('#createPassword').value,c=$('#confirmPassword').value;if(p.length<4)return msg('密码至少 4 位');if(p!==c)return msg('两次密码不一致');const code=Math.random().toString(36).slice(2,6).toUpperCase()+'-'+Math.random().toString(36).slice(2,6).toUpperCase();const v={id:uid('vault'),code,passwordHash:await hash(p),settings:{autoLock:15,theme:'system'},notes:demoNotes(),createdAt:now(),updatedAt:now()};vaults.push(v);persist();await openSession(v);$('#openCode').value=code;msg('已创建：'+code)}
async function openVault(){const code=$('#openCode').value.trim().toUpperCase(),p=$('#openPassword').value;const v=vaults.find(x=>x.code===code);if(!v||v.passwordHash!==await hash(p))return msg('保险箱编号或密码不正确');await openSession(v)}
async function openSession(v){current=v;sessionStorage.setItem(SESSION,v.id);entry.classList.add('hidden');currentNoteId=(v.notes.find(n=>!n.deleted)||v.notes[0]||null)?.id||null;render();resetAutoLock();msg('保险箱已打开')}
function lock(){current=null;currentNoteId=null;sessionStorage.removeItem(SESSION);entry.classList.remove('hidden');editor.innerHTML='<div class="editor-placeholder">保险箱已锁定</div>';msg('已锁定')}
function resetAutoLock(){clearTimeout(autoLockTimer);if(current?.settings.autoLock){autoLockTimer=setTimeout(lock,current.settings.autoLock*60*1000)}} ['click','keydown','input','mousemove'].forEach(e=>document.addEventListener(e,()=>current&&resetAutoLock(),{passive:true}));
function notesFiltered(){if(!current)return[];const q=$('#search')?.value.trim().toLowerCase()||'';let arr=current.notes.filter(n=>filter==='trash'?n.deleted:!n.deleted);if(filter==='pinned')arr=arr.filter(n=>n.pinned);if(filter==='images')arr=arr.filter(n=>n.media.images);if(filter==='links')arr=arr.filter(n=>n.media.links);if(q)arr=arr.filter(n=>(n.title+n.plain).toLowerCase().includes(q));return arr.sort((a,b)=>(b.pinned-a.pinned)||new Date(b.updatedAt)-new Date(a.updatedAt))}
function render(){if(!current)return;$('#vaultCodeLabel').textContent=current.code;$('#lockStatus').textContent='已解锁 · '+(current.settings.autoLock?current.settings.autoLock+' 分钟自动锁定':'不自动锁定');const alive=current.notes.filter(n=>!n.deleted),trash=current.notes.filter(n=>n.deleted);$('#countAll').textContent=alive.length;$('#countPinned').textContent=alive.filter(n=>n.pinned).length;$('#countRecent').textContent=alive.length;$('#countImages').textContent=alive.filter(n=>n.media.images).length;$('#countLinks').textContent=alive.filter(n=>n.media.links).length;$('#countTrash').textContent=trash.length;$('#listTitle').textContent={all:'备忘录',pinned:'已置顶',recent:'最近编辑',images:'含图片',links:'含链接',trash:'废纸篓'}[filter];renderList();renderEditor()}
function renderList(){const arr=notesFiltered();notesEl.innerHTML=arr.length?arr.map(n=>`<article class="note ${n.id===currentNoteId?'active':''}" data-id="${n.id}"><h3>${n.pinned?'📌 ':''}${escapeHtml(n.title||'新备忘录')}</h3><p>${escapeHtml((n.plain||'').slice(0,52))||'无内容'}</p><div class="meta"><span>${timeLabel(n.updatedAt)}</span><span class="chips">${n.media.images?'<b class="chip">🖼️</b>':''}${n.media.links?'<b class="chip">🔗</b>':''}${n.media.files?'<b class="chip">📎</b>':''}</span></div></article>`).join(''):'<div class="empty">没有备忘录</div>'}
function currentNote(){return current?.notes.find(n=>n.id===currentNoteId)}
function renderEditor(){const n=currentNote();if(!n){editor.innerHTML='<div class="editor-placeholder">没有选中的备忘录</div>';return}const trash=n.deleted;editor.innerHTML=`<div class="toolbar"><div class="tools">${trash?'<button class="tool" data-act="restore">恢复</button><button class="tool" data-act="permanent">永久删除</button>':`<button class="tool" data-cmd="bold">B</button><button class="tool" data-cmd="italic">I</button><button class="tool" data-cmd="strikeThrough">S</button><button class="tool" data-cmd="insertUnorderedList">• 列表</button><button class="tool" data-cmd="insertOrderedList">1. 列表</button><button class="tool" data-act="todo">☑︎</button><button class="tool" data-act="quote">引用</button><button class="tool" data-act="code">代码</button><button class="tool" data-act="image">🖼️</button><button class="tool" data-act="link">🔗</button><button class="tool" data-act="file">📎</button><button class="tool" data-act="pin">${n.pinned?'取消置顶':'置顶'}</button><button class="tool" data-act="delete">删除</button>`}</div><span class="save" id="saveState">已保存 · ${timeLabel(n.updatedAt)}</span></div><article class="content"><input class="title" id="noteTitle" value="${escapeHtml(n.title)}" ${trash?'disabled':''}/><div class="date">创建 ${timeLabel(n.createdAt)} · 更新 ${timeLabel(n.updatedAt)}</div><div class="body" id="noteBody" contenteditable="${!trash}">${n.html}</div></article>`}
function saveNote(){const n=currentNote();if(!n||n.deleted)return;n.title=$('#noteTitle').value||'新备忘录';n.html=$('#noteBody').innerHTML;n.plain=$('#noteBody').innerText;n.updatedAt=now();n.media={images:$('#noteBody').querySelectorAll('img').length,links:$('#noteBody').querySelectorAll('a,.link-card').length,files:$('#noteBody').querySelectorAll('.attach').length};current.updatedAt=now();persist();renderList();const st=$('#saveState');if(st)st.textContent='已保存 · 刚刚'}
function debouncedSave(){const st=$('#saveState');if(st)st.textContent='正在保存...';clearTimeout(saveTimer);saveTimer=setTimeout(saveNote,500)}
function insertHtml(html){document.execCommand('insertHTML',false,html);debouncedSave()}
function handleAction(act){const n=currentNote();if(!n)return;if(act==='pin'){n.pinned=!n.pinned;n.updatedAt=now();persist();render();msg(n.pinned?'已置顶':'已取消置顶')} if(act==='delete')modal('删除备忘录','移到废纸篓，可稍后恢复。','',()=>{n.deleted=true;n.deletedAt=now();currentNoteId=(current.notes.find(x=>!x.deleted)||{}).id;persist();render();msg('已移到废纸篓')},true); if(act==='restore'){n.deleted=false;n.deletedAt=null;filter='all';persist();setActiveNav();render();msg('已恢复')} if(act==='permanent')modal('永久删除','此操作不可恢复。','',()=>{current.notes=current.notes.filter(x=>x.id!==n.id);currentNoteId=(current.notes.find(x=>!x.deleted)||{}).id;persist();render();msg('已永久删除')},true); if(act==='todo')insertHtml('<ul><li>新的待办事项</li></ul>'); if(act==='quote')insertHtml('<blockquote>引用内容</blockquote>'); if(act==='code')insertHtml('<pre><code>code here</code></pre>'); if(act==='link'){const url=prompt('输入链接 URL');if(url)insertHtml(`<div class="media-block link-card"><div class="favicon">🔗</div><div><b><a href="${escapeHtml(url)}" target="_blank">${escapeHtml(url)}</a></b><br><small>链接卡片</small></div></div>`)} if(act==='image')$('#imageInput').click(); if(act==='file')$('#fileInput').click()}
function setActiveNav(){ $$('.nav[data-filter]').forEach(b=>b.classList.toggle('active',b.dataset.filter===filter)) }
$('#createVaultBtn').onclick=createVault;$('#openVaultBtn').onclick=openVault;$('#createTab').onclick=()=>{$('#createTab').classList.add('active');$('#openTab').classList.remove('active');$('#createForm').classList.remove('hidden');$('#openForm').classList.add('hidden')};$('#openTab').onclick=()=>{$('#openTab').classList.add('active');$('#createTab').classList.remove('active');$('#openForm').classList.remove('hidden');$('#createForm').classList.add('hidden')};
$('#newBtn').onclick=()=>{const n=templateNote();current.notes.unshift(n);currentNoteId=n.id;persist();filter='all';setActiveNav();render();msg('已新建备忘录')};$('#search').oninput=renderList;notesEl.onclick=e=>{const item=e.target.closest('.note');if(item){currentNoteId=item.dataset.id;render()}};$('.side').onclick=e=>{const nav=e.target.closest('.nav[data-filter]');if(nav){filter=nav.dataset.filter;setActiveNav();render()}};$('#lockBtn').onclick=lock;
$('#editor').addEventListener('click',e=>{const b=e.target.closest('.tool');if(!b)return;if(b.dataset.cmd){document.execCommand(b.dataset.cmd);debouncedSave()}else handleAction(b.dataset.act)});$('#editor').addEventListener('input',e=>{if(e.target.id==='noteTitle'||e.target.id==='noteBody')debouncedSave()});
$('#imageInput').onchange=e=>{[...e.target.files].forEach(file=>{const r=new FileReader();r.onload=()=>insertHtml(`<img src="${r.result}" alt="${escapeHtml(file.name)}"><div class="hint">${escapeHtml(file.name)}</div>`);r.readAsDataURL(file)});e.target.value=''};
$('#fileInput').onchange=e=>{[...e.target.files].forEach(file=>insertHtml(`<div class="media-block attach"><div class="file">📎</div><div><b>${escapeHtml(file.name)}</b><br><small>${Math.round(file.size/1024)} KB · 本地附件占位</small></div></div>`));e.target.value=''};
$('#settingsBtn').onclick=()=>{if(!current)return;modal('保险箱设置','修改自动锁定时间。',`<select id="autoLockSelect"><option value="5">5 分钟</option><option value="15">15 分钟</option><option value="30">30 分钟</option><option value="0">永不</option></select>`,()=>{current.settings.autoLock=Number($('#autoLockSelect').value)||0;persist();render();resetAutoLock();msg('设置已保存')});setTimeout(()=>{$('#autoLockSelect').value=String(current.settings.autoLock||0)},0)};
$('#exportBtn').onclick=()=>{if(!current)return;const blob=new Blob([JSON.stringify(current,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`easynote-${current.code}.json`;a.click();URL.revokeObjectURL(a.href);msg('已导出 JSON')};
$('#deleteVaultBtn').onclick=()=>{if(!current)return;modal('删除保险箱','请输入保险箱编号确认删除。',`<input id="deleteCode" placeholder="${current.code}">`,()=>{if($('#deleteCode').value.trim().toUpperCase()!==current.code)return msg('编号不匹配');vaults=vaults.filter(v=>v.id!==current.id);persist();lock();msg('保险箱已删除')},true)};
$('#modal').onclick=e=>{if(e.target.id==='modal')$('#modal').classList.remove('show')};
(async()=>{const sid=sessionStorage.getItem(SESSION);const v=vaults.find(x=>x.id===sid);if(v){current=v;entry.classList.add('hidden');currentNoteId=(v.notes.find(n=>!n.deleted)||v.notes[0]||{}).id;render();resetAutoLock()}else{app.classList.add('ready')}})();
</script>
</body>
</html>
