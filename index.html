      locked: '金庫がロックされています。パスワードを再入力してください。',
      rate_limit_exceeded: 'パスワード試行回数が多すぎます。後でもう一度お試しください。',
      server_error: 'サーバーエラー。もう一度お試しください。',
      network_error: 'ネットワークエラー。接続を確認してください。'
    }
  }
};

// Detect browser language
function detectLanguage() {
  const browserLang = navigator.language || navigator.userLanguage || 'en';
  if (browserLang.startsWith('zh')) {
    if (browserLang.includes('TW') || browserLang.includes('HK') || browserLang.includes('Hant')) {
      return 'zh-TW';
    }
    return 'zh-CN';
  }
  if (browserLang.startsWith('ja')) return 'ja';
  return 'en';
}

const currentLang = detectLanguage();
const t = i18n[currentLang] || i18n['en'];

// Update page title and lang attribute
document.title = t.appTitle;
document.documentElement.lang = currentLang;

let token=sessionStorage.getItem('lockernote.token')||sessionStorage.getItem('easynote.token')||'', notes=[], currentNoteId=null, filter='all', saveTimer=null, autoLockTimer=null, settings={autoLock:15,theme:'system'};
const $=s=>document.querySelector(s), $$=s=>Array.from(document.querySelectorAll(s)); const notesEl=$('#notes'), editor=$('#editor'), entry=$('#entry'), toast=$('#toast');

// Initialize UI text with translations
function initI18n() {
  $('#brandDesc').textContent = t.brandDesc;
  $('#vaultAccess').textContent = t.vaultAccess;
  $('#passwordOnly').textContent = t.passwordOnly;
  $('#lockStatus').textContent = t.lockStatus;
  $('#notesSectionTitle').textContent = t.notesTitle;
  $('#navAllNotes').textContent = t.allNotes;
  $('#navPinned').textContent = t.pinned;
  $('#navRecent').textContent = t.recent;
  $('#navImages').textContent = t.images;
  $('#navLinks').textContent = t.links;
  $('#vaultSectionTitle').textContent = t.notesTitle;
  $('#navTrash').textContent = t.trash;
  $('#navSettings').textContent = t.settings;
  $('#lockBtn').textContent = t.lockVault;
  $('#exportBtn').textContent = t.exportData;
  $('#deleteVaultBtn').textContent = t.deleteVault;
  $('#listTitle').textContent = t.notesTitle;
  $('#search').placeholder = t.searchPlaceholder;
  $('#editorPlaceholder').textContent = t.placeholder;
  $('#entryTitle').textContent = t.entryTitle;
  $('#entryTagline').textContent = t.entryTagline;
  $('#entryDesc').textContent = t.entryDesc;
  $('#passwordLabel').textContent = t.passwordLabel;
  $('#password').placeholder = t.passwordPlaceholder;
  $('#passwordHint').textContent = t.passwordHint;
  $('#openVaultBtn').textContent = t.openVaultBtn;
  $('#modalCancel').textContent = t.cancel;
  $('#modalOk').textContent = t.confirm;
}

function now(){return new Date().toISOString()} function timeLabel(iso){const d=new Date(iso);const locale=currentLang==='ja'?'ja-JP':currentLang==='zh-TW'?'zh-TW':currentLang==='zh-CN'?'zh-CN':'en-US';return d.toLocaleString(locale,{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})} function escapeHtml(s=''){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))} function msg(txt){toast.textContent=txt;toast.classList.add('show');clearTimeout(msg.t);msg.t=setTimeout(()=>toast.classList.remove('show'),1700)}
function errorText(code){return t.errors[code]||t.errors.server_error}
async function api(path, options={}){const res=await fetch(path,{...options,headers:{'Content-Type':'application/json',...(token?{Authorization:'Bearer '+token}:{}),...(options.headers||{})}});if(!res.ok){const data=await res.json().catch(()=>({error:res.statusText}));throw new Error(errorText(data.error||data.detail||res.statusText))}return res.json()}
function modal(title,text,extra='',ok=()=>{},danger=false){$('#modalTitle').textContent=title;$('#modalText').textContent=text;$('#modalExtra').innerHTML=extra;$('#modalOk').className=danger?'danger':'primary';$('#modal').classList.add('show');$('#modalOk').onclick=()=>{$('#modal').classList.remove('show');ok()};$('#modalCancel').onclick=()=>$('#modal').classList.remove('show')}
async function openVault(){const password=$('#password').value;if(password.length<4)return msg(t.errors.password_too_short);try{const data=await api('/api/vault/open',{method:'POST',body:JSON.stringify({password})});token=data.token;settings=data.vault.settings||settings;sessionStorage.setItem('lockernote.token',token);entry.classList.add('hidden');await loadNotes();resetAutoLock();msg(t.unlockStatus)}catch(e){msg(errorText(e.message))}}
async function loadNotes(){const data=await api('/api/notes');notes=data.notes;currentNoteId=(notes.find(n=>!n.deleted)||notes[0]||{}).id||null;render()}
async function lock(){try{if(token)await api('/api/vault/lock',{method:'POST'})}catch{} token='';sessionStorage.removeItem('lockernote.token');sessionStorage.removeItem('easynote.token');entry.classList.remove('hidden');editor.innerHTML=`<div class="placeholder">${t.lockStatus}</div>`;$('#lockStatus').textContent=t.lockStatus;msg(t.lockStatus)}
function resetAutoLock(){clearTimeout(autoLockTimer);if(settings.autoLock)autoLockTimer=setTimeout(lock,settings.autoLock*60*1000)} ['click','keydown','input','mousemove'].forEach(e=>document.addEventListener(e,()=>token&&resetAutoLock(),{passive:true}));
function filtered(){const q=$('#search').value.trim().toLowerCase();let arr=notes.filter(n=>filter==='trash'?n.deleted:!n.deleted);if(filter==='pinned')arr=arr.filter(n=>n.pinned);if(filter==='images')arr=arr.filter(n=>n.media?.images);if(filter==='links')arr=arr.filter(n=>n.media?.links);if(q)arr=arr.filter(n=>(n.title+n.plain).toLowerCase().includes(q));return arr.sort((a,b)=>(b.pinned-a.pinned)||new Date(b.updatedAt)-new Date(a.updatedAt))}
function render(){const alive=notes.filter(n=>!n.deleted), trash=notes.filter(n=>n.deleted);const autoLockText=settings.autoLock?`${settings.autoLock} ${t.autoLockMinutes}`:t.autoLockNever;$('#lockStatus').textContent=`${t.unlockStatus} · ${autoLockText}`;$('#countAll').textContent=alive.length;$('#countPinned').textContent=alive.filter(n=>n.pinned).length;$('#countRecent').textContent=alive.length;$('#countImages').textContent=alive.filter(n=>n.media?.images).length;$('#countLinks').textContent=alive.filter(n=>n.media?.links).length;$('#countTrash').textContent=trash.length;const titles={all:t.notesTitle,pinned:t.pinned.replace('📌 ',''),recent:t.recent.replace('🕘 ',''),images:t.images.replace('🖼️ ',''),links:t.links.replace('🔗 ',''),trash:t.trash.replace('🗑️ ','')};$('#listTitle').textContent=titles[filter];renderList();renderEditor()}
function renderList(){const arr=filtered();notesEl.innerHTML=arr.length?arr.map(n=>`<article class="note ${n.id===currentNoteId?'active':''}" data-id="${n.id}"><h3>${n.pinned?'📌 ':''}${escapeHtml(n.title||t.newNoteTitle)}</h3><p>${escapeHtml((n.plain||'').slice(0,52))||t.newNoteContent.replace(/<[^>]*>/g,'').slice(0,30)}</p><div class="meta"><span>${timeLabel(n.updatedAt)}</span><span class="chips">${n.media?.images?'<b class="chip">🖼️</b>':''}${n.media?.links?'<b class="chip">🔗</b>':''}${n.media?.files?'<b class="chip">📎</b>':''}</span></div></article>`).join(''):`<div class="empty">${t.placeholder}</div>`}
function note(){return notes.find(n=>n.id===currentNoteId)}
function renderEditor(){const n=note();if(!n){editor.innerHTML=`<div class="placeholder">${t.placeholder}</div>`;return}const trash=n.deleted;const restoreBtn=currentLang==='zh-CN'?'恢复':(currentLang==='zh-TW'?'恢復':(currentLang==='ja'?'復元':'Restore'));const permDelBtn=currentLang==='zh-CN'?'永久删除':(currentLang==='zh-TW'?'永久刪除':(currentLang==='ja'?'完全削除':'Delete Forever'));const unpinBtn=currentLang==='zh-CN'?'取消置顶':(currentLang==='zh-TW'?'取消置頂':(currentLang==='ja'?'ピン留め解除':'Unpin'));const pinBtn=currentLang==='zh-CN'?'置顶':(currentLang==='zh-TW'?'置頂':(currentLang==='ja'?'ピン留め':'Pin'));const deleteBtn=currentLang==='zh-CN'?'删除':(currentLang==='zh-TW'?'刪除':(currentLang==='ja'?'削除':'Delete'));const savedText=currentLang==='zh-CN'?'已保存':(currentLang==='zh-TW'?'已保存':(currentLang==='ja'?'保存済み':'Saved'));const createdText=currentLang==='zh-CN'?'创建':(currentLang==='zh-TW'?'創建':(currentLang==='ja'?'作成':'Created'));const updatedText=currentLang==='zh-CN'?'更新':(currentLang==='zh-TW'?'更新':(currentLang==='ja'?'更新':'Updated'));editor.innerHTML=`<div class="toolbar"><div class="tools">${trash?`<button class="tool" data-act="restore">${restoreBtn}</button><button class="tool" data-act="permanent">${permDelBtn}</button>`:`<button class="tool" data-cmd="bold">B</button><button class="tool" data-cmd="italic">I</button><button class="tool" data-cmd="strikeThrough">S</button><button class="tool" data-cmd="insertUnorderedList">• </button><button class="tool" data-cmd="insertOrderedList">1. </button><button class="tool" data-act="todo">☑︎</button><button class="tool" data-act="quote">"</button><button class="tool" data-act="code">&lt;/&gt;</button><button class="tool" data-act="image">🖼️</button><button class="tool" data-act="link">🔗</button><button class="tool" data-act="file">📎</button><button class="tool" data-act="pin">${n.pinned?unpinBtn:pinBtn}</button><button class="tool" data-act="delete">${deleteBtn}</button>`}</div><span class="save" id="saveState">${savedText} · ${timeLabel(n.updatedAt)}</span></div><article class="content"><input class="title" id="noteTitle" value="${escapeHtml(n.title)}" ${trash?'disabled':''}/><div class="date">${createdText} ${timeLabel(n.createdAt)} · ${updatedText} ${timeLabel(n.updatedAt)}</div><div class="body" id="noteBody" contenteditable="${!trash}">${n.html}</div></article>`}
async function persistNote(n){const data=await api('/api/notes/'+n.id,{method:'PATCH',body:JSON.stringify(n)});Object.assign(n,data.note);renderList();const st=$('#saveState');if(st)st.textContent='已保存 · 刚刚'}
function collectMedia(){const b=$('#noteBody');return{images:b.querySelectorAll('img').length,links:b.querySelectorAll('a,.link-card').length,files:b.querySelectorAll('.attach').length}}
function debouncedSave(){const n=note();if(!n||n.deleted)return;n.title=$('#noteTitle').value||'新备忘录';n.html=$('#noteBody').innerHTML;n.plain=$('#noteBody').innerText;n.media=collectMedia();const st=$('#saveState');if(st)st.textContent='正在保存到数据库...';clearTimeout(saveTimer);saveTimer=setTimeout(()=>persistNote(n).catch(e=>msg('保存失败：'+e.message)),550)}
function insertHtml(html){document.execCommand('insertHTML',false,html);debouncedSave()}
async function action(act){const n=note();if(!n)return;if(act==='pin'){n.pinned=!n.pinned;await persistNote(n);render();msg(n.pinned?'已置顶':'已取消置顶')}if(act==='delete')modal('删除备忘录','移到废纸篓，可稍后恢复。','',async()=>{await api('/api/notes/'+n.id,{method:'DELETE'});await loadNotes();msg('已移到废纸篓')},true);if(act==='restore'){n.deleted=false;await persistNote(n);filter='all';setActiveNav();render();msg('已恢复')}if(act==='permanent')modal('永久删除','此操作不可恢复。','',async()=>{await api('/api/notes/'+n.id+'?permanent=1',{method:'DELETE'});await loadNotes();msg('已永久删除')},true);if(act==='todo')insertHtml('<ul><li>新的待办事项</li></ul>');if(act==='quote')insertHtml('<blockquote>引用内容</blockquote>');if(act==='code')insertHtml('<pre><code>code here</code></pre>');if(act==='link'){const url=prompt('输入链接 URL');if(url)insertHtml(`<div class="media-block link-card"><div class="favicon">🔗</div><div><b><a href="${escapeHtml(url)}" target="_blank">${escapeHtml(url)}</a></b><br><small>链接卡片</small></div></div>`)}if(act==='image')$('#imageInput').click();if(act==='file')$('#fileInput').click()}
function setActiveNav(){$$('.nav[data-filter]').forEach(b=>b.classList.toggle('active',b.dataset.filter===filter))}
$('#openVaultBtn').onclick=openVault;$('#password').addEventListener('keydown',e=>{if(e.key==='Enter')openVault()});$('#newBtn').onclick=async()=>{const data=await api('/api/notes',{method:'POST',body:JSON.stringify({title:'新备忘录',html:'<p>开始记录...</p>',plain:'开始记录...',media:{images:0,links:0,files:0}})});notes.unshift(data.note);currentNoteId=data.note.id;filter='all';setActiveNav();render();msg('已新建并写入数据库')};$('#search').oninput=renderList;notesEl.onclick=e=>{const item=e.target.closest('.note');if(item){currentNoteId=item.dataset.id;render()}};$('.side').onclick=e=>{const nav=e.target.closest('.nav[data-filter]');if(nav){filter=nav.dataset.filter;setActiveNav();render()}};$('#lockBtn').onclick=lock;
$('#editor').addEventListener('click',e=>{const b=e.target.closest('.tool');if(!b)return;if(b.dataset.cmd){document.execCommand(b.dataset.cmd);debouncedSave()}else action(b.dataset.act)});$('#editor').addEventListener('input',e=>{if(e.target.id==='noteTitle'||e.target.id==='noteBody')debouncedSave()});
$('#imageInput').onchange=e=>{[...e.target.files].forEach(file=>{const r=new FileReader();r.onload=()=>insertHtml(`<img src="${r.result}" alt="${escapeHtml(file.name)}"><div class="hint">${escapeHtml(file.name)}</div>`);r.readAsDataURL(file)});e.target.value=''};$('#fileInput').onchange=e=>{[...e.target.files].forEach(file=>insertHtml(`<div class="media-block attach"><div class="file">📎</div><div><b>${escapeHtml(file.name)}</b><br><small>${Math.round(file.size/1024)} KB · 文件元数据保存到数据库</small></div></div>`));e.target.value=''};
$('#settingsBtn').onclick=()=>modal('保险箱设置','修改自动锁定时间。',`<select id="autoLockSelect"><option value="5">5 分钟</option><option value="15">15 分钟</option><option value="30">30 分钟</option><option value="0">永不</option></select>`,async()=>{settings.autoLock=Number($('#autoLockSelect').value)||0;await api('/api/vault/settings',{method:'PATCH',body:JSON.stringify({settings})});render();resetAutoLock();msg('设置已保存到数据库')});
$('#exportBtn').onclick=async()=>{const data=await api('/api/export');const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='lockernote-export.json';a.click();URL.revokeObjectURL(a.href);msg('已导出数据库数据')};$('#deleteVaultBtn').onclick=()=>modal('删除保险箱','确认删除当前密码对应的所有数据库内容？','',async()=>{await api('/api/vault',{method:'DELETE'});await lock();msg('保险箱已删除')},true);$('#modal').onclick=e=>{if(e.target.id==='modal')$('#modal').classList.remove('show')};
initI18n();
if(token)loadNotes().then(()=>{entry.classList.add('hidden');resetAutoLock()}).catch(()=>lock());
</script>
