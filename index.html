<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LockerNote · 你的备忘录保险箱</title>
  <style>
    :root{--bg:#f5f5f7;--text:#1d1d1f;--muted:#6e6e73;--line:rgba(0,0,0,.08);--yellow:#ffd60a;--blue:#007aff;--green:#34c759;--red:#ff3b30;--shadow:0 24px 60px rgba(0,0,0,.12)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 16% 8%,rgba(255,214,10,.32),transparent 28%),radial-gradient(circle at 92% 6%,rgba(0,122,255,.14),transparent 32%),linear-gradient(135deg,#fbfbfd,#f5f5f7);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Helvetica Neue",Arial,sans-serif}button,input,select{font:inherit}button{border:0;cursor:pointer}.hidden{display:none!important}
    .app{width:min(1440px,calc(100vw - 32px));height:calc(100vh - 32px);margin:16px auto;display:grid;grid-template-columns:260px 360px 1fr;border:1px solid rgba(255,255,255,.8);border-radius:30px;overflow:hidden;background:rgba(255,255,255,.62);box-shadow:var(--shadow);backdrop-filter:blur(24px)}
    .side{padding:22px 16px;border-right:1px solid var(--line);background:rgba(246,246,248,.82);overflow:auto}.brand{display:flex;gap:12px;align-items:center;padding:0 8px 20px}.logo{width:44px;height:44px;border-radius:15px;display:grid;place-items:center;background:linear-gradient(145deg,#ffe35a,#ffb700);font-size:22px}.brand h1{margin:0;font-size:19px;letter-spacing:-.04em}.brand p{margin:2px 0 0;color:var(--muted);font-size:12px}.vault{background:#fff;border:1px solid var(--line);border-radius:22px;padding:16px;margin-bottom:16px}.vault small{color:var(--muted)}.vault strong{display:block;margin-top:4px;font-size:16px}.status{display:flex;gap:8px;align-items:center;margin-top:12px;color:var(--green);font-size:13px}.dot{width:8px;height:8px;border-radius:50%;background:var(--green)}.section{margin-top:18px}.section-title{padding:0 10px 8px;color:var(--muted);font-size:12px;font-weight:800;text-transform:uppercase}.nav{width:100%;display:flex;align-items:center;justify-content:space-between;text-align:left;padding:10px 12px;border-radius:13px;background:transparent;color:#2d2d2f;margin:2px 0}.nav.active{background:rgba(255,214,10,.55);font-weight:800}.count{color:var(--muted);font-size:13px}.actions{display:grid;gap:8px;margin-top:20px}.black{background:#1d1d1f;color:#fff}.danger{background:var(--red);color:#fff}.secondary{background:#f2f2f4;color:#222}.primary{background:var(--blue);color:#fff}.actions button,.modal button{border-radius:14px;padding:12px;font-weight:800}
    .list{display:flex;flex-direction:column;border-right:1px solid var(--line);background:rgba(255,255,255,.74);min-width:0}.list-head{padding:24px 22px 14px}.head-row{display:flex;align-items:center;justify-content:space-between}.head-row h2{margin:0;font-size:30px;letter-spacing:-.055em}.new{width:42px;height:42px;border-radius:50%;background:var(--yellow);font-size:26px;box-shadow:0 8px 18px rgba(216,155,0,.22)}.search{width:100%;margin-top:16px;padding:12px 14px;border:0;outline:0;border-radius:14px;background:#f1f1f3}.notes{padding:0 12px 18px;overflow:auto}.note{padding:15px 14px;border-radius:18px;margin:7px 0;border:1px solid transparent;cursor:pointer}.note.active{background:#fff8d6;border-color:rgba(216,155,0,.22)}.note h3{margin:0;font-size:16px}.note p{margin:6px 0 10px;color:var(--muted);font-size:13px;line-height:1.45}.meta{display:flex;align-items:center;justify-content:space-between;color:var(--muted);font-size:12px}.chips{display:flex;gap:5px}.chip{background:rgba(0,0,0,.06);padding:2px 6px;border-radius:99px}.empty{padding:18px 14px;color:var(--muted)}
    .editor{display:flex;flex-direction:column;background:rgba(255,255,255,.9);min-width:0}.toolbar{min-height:72px;padding:12px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}.tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.tool{min-width:36px;height:36px;padding:0 12px;border-radius:11px;background:#f2f2f4;font-weight:800}.save{color:var(--muted);font-size:13px}.content{padding:34px 52px;overflow:auto;max-width:960px}.title{width:100%;border:0;outline:0;background:transparent;font-size:42px;font-weight:900;letter-spacing:-.06em;margin-bottom:10px}.date{color:var(--muted);font-size:13px;margin-bottom:22px}.body{min-height:260px;outline:0;font-size:18px;line-height:1.75}.body img{max-width:100%;border-radius:18px;margin:12px 0}.body a{color:var(--blue)}.body blockquote{border-left:4px solid var(--yellow);margin:14px 0;padding:4px 0 4px 14px;color:#444}.body pre{background:#f2f2f4;border-radius:16px;padding:14px;overflow:auto}.media-block{border:1px solid var(--line);border-radius:18px;background:#fff;padding:14px;margin:14px 0}.link-card{display:flex;gap:12px;align-items:flex-start}.favicon{width:42px;height:42px;border-radius:12px;background:#e8f1ff;display:grid;place-items:center}.attach{display:flex;gap:12px;align-items:center}.file{width:44px;height:44px;border-radius:14px;background:#f2f2f4;display:grid;place-items:center}.upload{display:none}.placeholder{display:grid;place-items:center;height:100%;color:var(--muted);font-size:18px}
    .entry{position:fixed;inset:0;background:rgba(245,245,247,.72);backdrop-filter:blur(18px);display:grid;place-items:center;z-index:40}.entry-card{width:min(520px,calc(100vw - 32px));background:rgba(255,255,255,.94);border:1px solid rgba(255,255,255,.8);border-radius:30px;padding:24px;box-shadow:var(--shadow)}.entry-card h2{margin:0;font-size:32px;letter-spacing:-.06em}.entry-card p{color:var(--muted);line-height:1.55}.field{display:grid;gap:6px;margin:18px 0 10px}.field label{font-size:13px;color:var(--muted);font-weight:800}.field input,.field select{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;background:#fafafa;outline:0}.form-actions{display:flex;gap:10px;margin-top:14px}.form-actions button{flex:1;border-radius:14px;padding:13px;font-weight:900}.hint{font-size:12px;color:var(--muted)}
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.22);display:none;place-items:center;z-index:50}.modal-backdrop.show{display:grid}.modal{width:min(460px,calc(100vw - 32px));background:rgba(255,255,255,.97);border-radius:24px;padding:20px;box-shadow:var(--shadow)}.modal h3{margin:0 0 8px}.modal p{margin:0 0 14px;color:var(--muted);line-height:1.5}.modal input,.modal select{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;margin:8px 0;background:#fafafa}.modal-row{display:flex;gap:8px;justify-content:flex-end;margin-top:10px}.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(18px);padding:12px 16px;border-radius:999px;background:rgba(29,29,31,.92);color:#fff;font-size:14px;opacity:0;pointer-events:none;transition:.22s;z-index:80}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media(max-width:980px){.app{width:100vw;height:100vh;margin:0;border-radius:0;grid-template-columns:1fr}.side{display:none}.list{display:none}.content{padding:24px}.title{font-size:34px}.toolbar{padding:10px}.save{width:100%}}
  </style>
</head>
<body>
  <main class="app"><aside class="side"><div class="brand"><div class="logo">🔐</div><div><h1>LockerNote</h1><p>你的备忘录保险箱</p></div></div><div class="vault"><small>当前访问方式</small><strong>仅使用保险箱密码</strong><div class="status"><span class="dot"></span><span id="lockStatus">未打开</span></div></div><section class="section"><div class="section-title">备忘录</div><button class="nav active" data-filter="all"><span>📝 所有备忘录</span><span class="count" id="countAll">0</span></button><button class="nav" data-filter="pinned"><span>📌 已置顶</span><span class="count" id="countPinned">0</span></button><button class="nav" data-filter="recent"><span>🕘 最近编辑</span><span class="count" id="countRecent">0</span></button><button class="nav" data-filter="images"><span>🖼️ 含图片</span><span class="count" id="countImages">0</span></button><button class="nav" data-filter="links"><span>🔗 含链接</span><span class="count" id="countLinks">0</span></button></section><section class="section"><div class="section-title">保险箱</div><button class="nav" data-filter="trash"><span>🗑️ 废纸篓</span><span class="count" id="countTrash">0</span></button><button class="nav" id="settingsBtn"><span>⚙️ 设置</span><span></span></button></section><div class="actions"><button class="black" id="lockBtn">锁定保险箱</button><button class="secondary" id="exportBtn">导出数据</button><button class="danger" id="deleteVaultBtn">删除保险箱</button></div></aside><section class="list"><div class="list-head"><div class="head-row"><h2 id="listTitle">备忘录</h2><button class="new" id="newBtn">+</button></div><input class="search" id="search" placeholder="搜索标题、正文、链接、图片说明" /></div><div class="notes" id="notes"></div></section><section class="editor" id="editor"><div class="placeholder">输入密码打开保险箱</div></section></main>
  <section class="entry" id="entry"><div class="entry-card"><h2>LockerNote</h2><p><strong>你的备忘录保险箱</strong></p><p>不用注册，只用密码打开。文字、图片、链接，都能放进自己的私人空间。</p><div class="field"><label>保险箱密码</label><input id="password" type="password" placeholder="输入你的保险箱密码" autofocus /></div><p class="hint">数据保存到后端 PostgreSQL 数据库；请牢记密码，无法找回。</p><div class="form-actions"><button class="primary" id="openVaultBtn">打开 / 创建保险箱</button></div></div></section>
  <input id="imageInput" class="upload" type="file" accept="image/*" multiple /><input id="fileInput" class="upload" type="file" multiple />
  <div class="modal-backdrop" id="modal"><div class="modal"><h3 id="modalTitle">提示</h3><p id="modalText"></p><div id="modalExtra"></div><div class="modal-row"><button class="secondary" id="modalCancel">取消</button><button class="primary" id="modalOk">确定</button></div></div></div><div class="toast" id="toast">完成</div>
<script>
let token=sessionStorage.getItem('lockernote.token')||sessionStorage.getItem('easynote.token')||'', notes=[], currentNoteId=null, filter='all', saveTimer=null, autoLockTimer=null, settings={autoLock:15,theme:'system'};
const $=s=>document.querySelector(s), $$=s=>Array.from(document.querySelectorAll(s)); const notesEl=$('#notes'), editor=$('#editor'), entry=$('#entry'), toast=$('#toast');
function now(){return new Date().toISOString()} function timeLabel(iso){const d=new Date(iso);return d.toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})} function escapeHtml(s=''){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))} function msg(t){toast.textContent=t;toast.classList.add('show');clearTimeout(msg.t);msg.t=setTimeout(()=>toast.classList.remove('show'),1700)}
function errorText(code){return {database_not_configured:'服务器数据库还没配置，请在部署平台绑定 PostgreSQL 并设置 DATABASE_URL。',password_too_short:'密码至少 4 位',locked:'保险箱已锁定，请重新输入密码',server_error:'服务器出错，请稍后重试'}[code]||code}
async function api(path, options={}){const res=await fetch(path,{...options,headers:{'Content-Type':'application/json',...(token?{Authorization:'Bearer '+token}:{}),...(options.headers||{})}});if(!res.ok){const data=await res.json().catch(()=>({error:res.statusText}));throw new Error(errorText(data.error||data.detail||res.statusText))}return res.json()}
function modal(title,text,extra='',ok=()=>{},danger=false){$('#modalTitle').textContent=title;$('#modalText').textContent=text;$('#modalExtra').innerHTML=extra;$('#modalOk').className=danger?'danger':'primary';$('#modal').classList.add('show');$('#modalOk').onclick=()=>{$('#modal').classList.remove('show');ok()};$('#modalCancel').onclick=()=>$('#modal').classList.remove('show')}
async function openVault(){const password=$('#password').value;if(password.length<4)return msg('密码至少 4 位');try{const data=await api('/api/vault/open',{method:'POST',body:JSON.stringify({password})});token=data.token;settings=data.vault.settings||settings;sessionStorage.setItem('lockernote.token',token);entry.classList.add('hidden');await loadNotes();resetAutoLock();msg('保险箱已打开')}catch(e){msg('打开失败：'+e.message)}}
async function loadNotes(){const data=await api('/api/notes');notes=data.notes;currentNoteId=(notes.find(n=>!n.deleted)||notes[0]||{}).id||null;render()}
async function lock(){try{if(token)await api('/api/vault/lock',{method:'POST'})}catch{} token='';sessionStorage.removeItem('lockernote.token');sessionStorage.removeItem('easynote.token');entry.classList.remove('hidden');editor.innerHTML='<div class="placeholder">保险箱已锁定</div>';$('#lockStatus').textContent='未打开';msg('已锁定')}
function resetAutoLock(){clearTimeout(autoLockTimer);if(settings.autoLock)autoLockTimer=setTimeout(lock,settings.autoLock*60*1000)} ['click','keydown','input','mousemove'].forEach(e=>document.addEventListener(e,()=>token&&resetAutoLock(),{passive:true}));
function filtered(){const q=$('#search').value.trim().toLowerCase();let arr=notes.filter(n=>filter==='trash'?n.deleted:!n.deleted);if(filter==='pinned')arr=arr.filter(n=>n.pinned);if(filter==='images')arr=arr.filter(n=>n.media?.images);if(filter==='links')arr=arr.filter(n=>n.media?.links);if(q)arr=arr.filter(n=>(n.title+n.plain).toLowerCase().includes(q));return arr.sort((a,b)=>(b.pinned-a.pinned)||new Date(b.updatedAt)-new Date(a.updatedAt))}
function render(){const alive=notes.filter(n=>!n.deleted), trash=notes.filter(n=>n.deleted);$('#lockStatus').textContent='已解锁 · '+(settings.autoLock?settings.autoLock+' 分钟自动锁定':'不自动锁定');$('#countAll').textContent=alive.length;$('#countPinned').textContent=alive.filter(n=>n.pinned).length;$('#countRecent').textContent=alive.length;$('#countImages').textContent=alive.filter(n=>n.media?.images).length;$('#countLinks').textContent=alive.filter(n=>n.media?.links).length;$('#countTrash').textContent=trash.length;$('#listTitle').textContent={all:'备忘录',pinned:'已置顶',recent:'最近编辑',images:'含图片',links:'含链接',trash:'废纸篓'}[filter];renderList();renderEditor()}
function renderList(){const arr=filtered();notesEl.innerHTML=arr.length?arr.map(n=>`<article class="note ${n.id===currentNoteId?'active':''}" data-id="${n.id}"><h3>${n.pinned?'📌 ':''}${escapeHtml(n.title||'新备忘录')}</h3><p>${escapeHtml((n.plain||'').slice(0,52))||'无内容'}</p><div class="meta"><span>${timeLabel(n.updatedAt)}</span><span class="chips">${n.media?.images?'<b class="chip">🖼️</b>':''}${n.media?.links?'<b class="chip">🔗</b>':''}${n.media?.files?'<b class="chip">📎</b>':''}</span></div></article>`).join(''):'<div class="empty">没有备忘录</div>'}
function note(){return notes.find(n=>n.id===currentNoteId)}
function renderEditor(){const n=note();if(!n){editor.innerHTML='<div class="placeholder">没有选中的备忘录</div>';return}const trash=n.deleted;editor.innerHTML=`<div class="toolbar"><div class="tools">${trash?'<button class="tool" data-act="restore">恢复</button><button class="tool" data-act="permanent">永久删除</button>':`<button class="tool" data-cmd="bold">B</button><button class="tool" data-cmd="italic">I</button><button class="tool" data-cmd="strikeThrough">S</button><button class="tool" data-cmd="insertUnorderedList">• 列表</button><button class="tool" data-cmd="insertOrderedList">1. 列表</button><button class="tool" data-act="todo">☑︎</button><button class="tool" data-act="quote">引用</button><button class="tool" data-act="code">代码</button><button class="tool" data-act="image">🖼️</button><button class="tool" data-act="link">🔗</button><button class="tool" data-act="file">📎</button><button class="tool" data-act="pin">${n.pinned?'取消置顶':'置顶'}</button><button class="tool" data-act="delete">删除</button>`}</div><span class="save" id="saveState">已保存 · ${timeLabel(n.updatedAt)}</span></div><article class="content"><input class="title" id="noteTitle" value="${escapeHtml(n.title)}" ${trash?'disabled':''}/><div class="date">创建 ${timeLabel(n.createdAt)} · 更新 ${timeLabel(n.updatedAt)}</div><div class="body" id="noteBody" contenteditable="${!trash}">${n.html}</div></article>`}
async function persistNote(n){const data=await api('/api/notes/'+n.id,{method:'PATCH',body:JSON.stringify(n)});Object.assign(n,data.note);renderList();const st=$('#saveState');if(st)st.textContent='已保存 · 刚刚'}
function collectMedia(){const b=$('#noteBody');return{images:b.querySelectorAll('img').length,links:b.querySelectorAll('a,.link-card').length,files:b.querySelectorAll('.attach').length}}
function debouncedSave(){const n=note();if(!n||n.deleted)return;n.title=$('#noteTitle').value||'新备忘录';n.html=$('#noteBody').innerHTML;n.plain=$('#noteBody').innerText;n.media=collectMedia();const st=$('#saveState');if(st)st.textContent='正在保存到数据库...';clearTimeout(saveTimer);saveTimer=setTimeout(()=>persistNote(n).catch(e=>msg('保存失败：'+e.message)),550)}
function insertHtml(html){document.execCommand('insertHTML',false,html);debouncedSave()}
async function action(act){const n=note();if(!n)return;if(act==='pin'){n.pinned=!n.pinned;await persistNote(n);render();msg(n.pinned?'已置顶':'已取消置顶')}if(act==='delete')modal('删除备忘录','移到废纸篓，可稍后恢复。','',async()=>{await api('/api/notes/'+n.id,{method:'DELETE'});await loadNotes();msg('已移到废纸篓')},true);if(act==='restore'){n.deleted=false;await persistNote(n);filter='all';setActiveNav();render();msg('已恢复')}if(act==='permanent')modal('永久删除','此操作不可恢复。','',async()=>{await api('/api/notes/'+n.id+'?permanent=1',{method:'DELETE'});await loadNotes();msg('已永久删除')},true);if(act==='todo')insertHtml('<ul><li>新的待办事项</li></ul>');if(act==='quote')insertHtml('<blockquote>引用内容</blockquote>');if(act==='code')insertHtml('<pre><code>code here</code></pre>');if(act==='link'){const url=prompt('输入链接 URL');if(url)insertHtml(`<div class="media-block link-card"><div class="favicon">🔗</div><div><b><a href="${escapeHtml(url)}" target="_blank">${escapeHtml(url)}</a></b><br><small>链接卡片</small></div></div>`)}if(act==='image')$('#imageInput').click();if(act==='file')$('#fileInput').click()}
function setActiveNav(){$$('.nav[data-filter]').forEach(b=>b.classList.toggle('active',b.dataset.filter===filter))}
$('#openVaultBtn').onclick=openVault;$('#password').addEventListener('keydown',e=>{if(e.key==='Enter')openVault()});$('#newBtn').onclick=async()=>{const data=await api('/api/notes',{method:'POST',body:JSON.stringify({title:'新备忘录',html:'<p>开始记录...</p>',plain:'开始记录...',media:{images:0,links:0,files:0}})});notes.unshift(data.note);currentNoteId=data.note.id;filter='all';setActiveNav();render();msg('已新建并写入数据库')};$('#search').oninput=renderList;notesEl.onclick=e=>{const item=e.target.closest('.note');if(item){currentNoteId=item.dataset.id;render()}};$('.side').onclick=e=>{const nav=e.target.closest('.nav[data-filter]');if(nav){filter=nav.dataset.filter;setActiveNav();render()}};$('#lockBtn').onclick=lock;
$('#editor').addEventListener('click',e=>{const b=e.target.closest('.tool');if(!b)return;if(b.dataset.cmd){document.execCommand(b.dataset.cmd);debouncedSave()}else action(b.dataset.act)});$('#editor').addEventListener('input',e=>{if(e.target.id==='noteTitle'||e.target.id==='noteBody')debouncedSave()});
$('#imageInput').onchange=e=>{[...e.target.files].forEach(file=>{const r=new FileReader();r.onload=()=>insertHtml(`<img src="${r.result}" alt="${escapeHtml(file.name)}"><div class="hint">${escapeHtml(file.name)}</div>`);r.readAsDataURL(file)});e.target.value=''};$('#fileInput').onchange=e=>{[...e.target.files].forEach(file=>insertHtml(`<div class="media-block attach"><div class="file">📎</div><div><b>${escapeHtml(file.name)}</b><br><small>${Math.round(file.size/1024)} KB · 文件元数据保存到数据库</small></div></div>`));e.target.value=''};
$('#settingsBtn').onclick=()=>modal('保险箱设置','修改自动锁定时间。',`<select id="autoLockSelect"><option value="5">5 分钟</option><option value="15">15 分钟</option><option value="30">30 分钟</option><option value="0">永不</option></select>`,async()=>{settings.autoLock=Number($('#autoLockSelect').value)||0;await api('/api/vault/settings',{method:'PATCH',body:JSON.stringify({settings})});render();resetAutoLock();msg('设置已保存到数据库')});
$('#exportBtn').onclick=async()=>{const data=await api('/api/export');const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='lockernote-export.json';a.click();URL.revokeObjectURL(a.href);msg('已导出数据库数据')};$('#deleteVaultBtn').onclick=()=>modal('删除保险箱','确认删除当前密码对应的所有数据库内容？','',async()=>{await api('/api/vault',{method:'DELETE'});await lock();msg('保险箱已删除')},true);$('#modal').onclick=e=>{if(e.target.id==='modal')$('#modal').classList.remove('show')};
if(token)loadNotes().then(()=>{entry.classList.add('hidden');resetAutoLock()}).catch(()=>lock());
</script>
</body>
</html>
